<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cover Maker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface2: #1e1e1e;
      --border: rgba(255,255,255,0.08);
      --border-mid: rgba(255,255,255,0.14);
      --text: #f0ede8;
      --text-muted: rgba(240,237,232,0.45);
      --text-dim: rgba(240,237,232,0.25);
      --accent: #c8b89a;
      --accent-dim: rgba(200,184,154,0.15);
      --red: #e05c5c;
      --radius: 6px;
      --radius-lg: 10px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

    header { display: flex; align-items: baseline; gap: 16px; padding: 28px 40px 20px; border-bottom: 1px solid var(--border); }
    header h1 { font-family: 'DM Serif Display', Georgia, serif; font-style: italic; font-size: 22px; font-weight: 400; color: var(--accent); letter-spacing: -0.01em; }
    header p { font-size: 13px; color: var(--text-muted); }

    main { display: grid; grid-template-columns: 300px 1fr; min-height: calc(100vh - 65px); }

    aside { border-right: 1px solid var(--border); padding: 28px 24px; display: flex; flex-direction: column; gap: 22px; overflow-y: auto; }

    .section-label { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 12px; color: var(--text-muted); }

    input[type=text] { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: inherit; font-size: 13px; padding: 8px 10px; width: 100%; transition: border-color 0.15s; outline: none; }
    input[type=text]:focus { border-color: var(--border-mid); }
    input[type=text].error { border-color: var(--red); }
    input[type=text]:disabled { opacity: 0.4; }

    .hex-row { display: flex; align-items: center; gap: 8px; }
    .hex-swatch { width: 28px; height: 28px; border-radius: 4px; border: 1px solid var(--border-mid); flex-shrink: 0; transition: background 0.2s; }
    .hex-row input { flex: 1; font-family: 'Courier New', monospace; font-size: 12px; letter-spacing: 0.05em; }

    .btn-group { display: flex; gap: 6px; }
    .btn { flex: 1; padding: 7px 6px; font-family: inherit; font-size: 12px; border: 1px solid var(--border); border-radius: var(--radius); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s; text-align: center; }
    .btn:hover { border-color: var(--border-mid); color: var(--text); }
    .btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    .pos-group { display: flex; flex-wrap: wrap; gap: 5px; }
    .pos-btn { padding: 5px 10px; font-family: inherit; font-size: 11px; border: 1px solid var(--border); border-radius: var(--radius); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
    .pos-btn:hover { border-color: var(--border-mid); color: var(--text); }
    .pos-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    .drop-zone { border: 1px dashed var(--border-mid); border-radius: var(--radius-lg); padding: 20px 16px; text-align: center; cursor: pointer; color: var(--text-muted); font-size: 12px; transition: all 0.15s; background: var(--surface2); line-height: 1.6; }
    .drop-zone:hover, .drop-zone.dragging { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .drop-zone.has-file { border-style: solid; border-color: var(--border-mid); color: var(--text); }

    .slider-row { display: flex; align-items: center; gap: 10px; }
    input[type=range] { flex: 1; -webkit-appearance: none; height: 3px; background: var(--border-mid); border-radius: 2px; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; }
    .slider-val { font-size: 11px; color: var(--text-muted); min-width: 28px; text-align: right; font-variant-numeric: tabular-nums; }

    .divider { height: 1px; background: var(--border); margin: 4px 0; }

    .dl-btn { width: 100%; padding: 10px; background: var(--accent); color: #0e0e0e; border: none; border-radius: var(--radius); font-family: 'DM Serif Display', serif; font-style: italic; font-size: 15px; cursor: pointer; transition: opacity 0.15s; letter-spacing: 0.01em; }
    .dl-btn:hover { opacity: 0.88; }
    .dl-btn:active { opacity: 0.75; }

    .canvas-area { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; gap: 12px; background: radial-gradient(ellipse 60% 50% at 70% 40%, rgba(200,184,154,0.04) 0%, transparent 70%), var(--bg); }

    /* Fixed square canvas */
    canvas { display: block; width: min(500px, calc(100vw - 360px)); aspect-ratio: 1 / 1; border-radius: 4px; box-shadow: 0 8px 60px rgba(0,0,0,0.7), 0 2px 12px rgba(0,0,0,0.5); }

    .canvas-meta { font-size: 11px; color: var(--text-dim); letter-spacing: 0.04em; }

    .label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
    .toggle-label { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-dim); cursor: pointer; }
    .toggle-label input { accent-color: var(--accent); width: 13px; height: 13px; cursor: pointer; }

    @media (max-width: 720px) {
      header { padding: 20px; }
      main { grid-template-columns: 1fr; }
      aside { border-right: none; border-bottom: 1px solid var(--border); }
      canvas { width: 100%; height: auto; max-width: 100%; aspect-ratio: 1; }
      .canvas-area { padding: 24px 16px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Cover Maker</h1>
  <p>Create album artwork in seconds</p>
</header>

<main>
  <aside>

    <div>
      <p class="section-label">Image</p>
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileIn').click()">
        Click to upload<br>or drag &amp; drop a photo
      </div>
      <input type="file" id="fileIn" accept="image/*" style="display:none">
    </div>

    <div class="divider"></div>

    <div>
      <p class="section-label">Text</p>
      <div style="display:flex;flex-direction:column;gap:10px;">

        <div class="field">
          <label>Title</label>
          <input type="text" id="titleIn" value="Album Title" oninput="render()">
        </div>

        <div class="field">
          <div class="label-row">
            <label style="margin:0">Artist</label>
            <label class="toggle-label">
              <input type="checkbox" id="artistEnabled" checked onchange="toggleArtist()"> show
            </label>
          </div>
          <input type="text" id="artistIn" value="Artist Name" oninput="render()">
        </div>

      </div>
    </div>

    <div>
      <p class="section-label">Font</p>
      <div class="btn-group">
        <button class="btn active" onclick="setFont('serif',this)">Serif</button>
        <button class="btn" onclick="setFont('sans',this)">Sans</button>
        <button class="btn" onclick="setFont('mono',this)">Mono</button>
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <p class="section-label">Layout</p>
      <div style="display:flex;flex-direction:column;gap:10px;">

        <div class="field">
          <label>Title alignment</label>
          <div class="btn-group" id="titleAlign">
            <button class="btn active" data-v="left" onclick="setAlign(this)">Left</button>
            <button class="btn" data-v="center" onclick="setAlign(this)">Centre</button>
            <button class="btn" data-v="right" onclick="setAlign(this)">Right</button>
          </div>
        </div>

        <div class="field">
          <label>Title position</label>
          <div class="pos-group" id="titlePos">
            <button class="pos-btn active" data-v="top" onclick="setPos('title',this)">Top</button>
            <button class="pos-btn" data-v="bottom" onclick="setPos('title',this)">Bottom</button>
            <button class="pos-btn" data-v="inside-top" onclick="setPos('title',this)">Inside top</button>
            <button class="pos-btn" data-v="inside-bottom" onclick="setPos('title',this)">Inside bottom</button>
          </div>
        </div>

        <div class="field" id="artistPosField">
          <label>Artist position</label>
          <div class="pos-group" id="artistPos">
            <button class="pos-btn active" data-v="right" onclick="setPos('artist',this)">Right</button>
            <button class="pos-btn" data-v="left" onclick="setPos('artist',this)">Left</button>
            <button class="pos-btn" data-v="inside-left" onclick="setPos('artist',this)">Inside left</button>
            <button class="pos-btn" data-v="inside-right" onclick="setPos('artist',this)">Inside right</button>
          </div>
        </div>

      </div>
    </div>

    <div class="divider"></div>

    <div>
      <p class="section-label">Colour</p>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div class="field">
          <label>Background</label>
          <div class="hex-row">
            <div class="hex-swatch" id="bgSwatch" style="background:#1a1a1a"></div>
            <input type="text" id="bgCol" value="#1a1a1a" placeholder="#1a1a1a" oninput="onHex('bg')">
          </div>
        </div>
        <div class="field">
          <label>Font &amp; border</label>
          <div class="hex-row">
            <div class="hex-swatch" id="fgSwatch" style="background:#ffffff;border-color:rgba(255,255,255,0.3)"></div>
            <input type="text" id="fgCol" value="#ffffff" placeholder="#ffffff" oninput="onHex('fg')">
          </div>
        </div>
      </div>
    </div>

    <div>
      <p class="section-label">Border thickness</p>
      <div class="slider-row">
        <input type="range" min="0" max="20" value="6" id="borderSz" oninput="document.getElementById('borderVal').textContent=this.value+'px'; render()">
        <span class="slider-val" id="borderVal">6px</span>
      </div>
    </div>

    <div class="divider"></div>

    <button class="dl-btn" onclick="download()">Download cover</button>

  </aside>

  <div class="canvas-area">
    <canvas id="cv" width="500" height="500"></canvas>
    <span class="canvas-meta">500 × 500 px · PNG</span>
  </div>
</main>

<script>
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  let img = null;
  let titlePos = 'top';
  let artistPos = 'right';
  let fontStyle = 'serif';
  let titleAlign = 'left';

  const SZ = 500;
  const IMG_MARGIN = 64;
  const FRAME_PAD = 16;
  const PAD = 10;

  // ── Helpers ──────────────────────────────────────────────

  function isValidHex(h) {
    return /^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(h);
  }

  function onHex(which) {
    const input = document.getElementById(which + 'Col');
    const swatch = document.getElementById(which + 'Swatch');
    let val = input.value.trim();
    if (!val.startsWith('#')) val = '#' + val;
    if (isValidHex(val)) {
      swatch.style.background = val;
      input.classList.remove('error');
      render();
    } else {
      input.classList.add('error');
    }
  }

  function getColor(which) {
    const val = document.getElementById(which + 'Col').value.trim();
    const norm = val.startsWith('#') ? val : '#' + val;
    return isValidHex(norm) ? norm : (which === 'bg' ? '#1a1a1a' : '#ffffff');
  }

  function fontString(sz) {
    if (fontStyle === 'serif') return `italic 500 ${sz}px 'DM Serif Display', Georgia, serif`;
    if (fontStyle === 'sans')  return `500 ${sz}px 'DM Sans', system-ui, sans-serif`;
    return `500 ${sz}px 'Courier New', monospace`;
  }

  // Binary-search largest font size that fits text in a box
  function fitFont(text, maxW, maxH) {
    let lo = 6, hi = Math.min(maxH, 300);
    for (let i = 0; i < 24; i++) {
      const mid = (lo + hi) / 2;
      ctx.font = fontString(mid);
      if (ctx.measureText(text).width <= maxW && mid <= maxH) lo = mid;
      else hi = mid;
    }
    return Math.floor(lo);
  }

  // Binary-search largest font size for vertical text (rotated 90°)
  function fitFontVertical(text, colW, colH) {
    // colW = the narrow dimension (what becomes height after rotation)
    // colH = the long dimension (what becomes width after rotation)
    let lo = 6, hi = Math.min(colW, 300);
    for (let i = 0; i < 24; i++) {
      const mid = (lo + hi) / 2;
      ctx.font = fontString(mid);
      // after rotation: text width must fit in colH, text height (≈mid) must fit in colW
      if (ctx.measureText(text).width <= colH && mid <= colW) lo = mid;
      else hi = mid;
    }
    return Math.floor(lo);
  }

  // ── Controls ─────────────────────────────────────────────

  function setAlign(btn) {
    document.getElementById('titleAlign').querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    titleAlign = btn.dataset.v;
    render();
  }

  function setFont(style, btn) {
    fontStyle = style;
    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function setPos(which, btn) {
    document.getElementById(which + 'Pos').querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (which === 'title') titlePos = btn.dataset.v;
    else artistPos = btn.dataset.v;
    render();
  }

  function toggleArtist() {
    const on = document.getElementById('artistEnabled').checked;
    document.getElementById('artistIn').disabled = !on;
    const pf = document.getElementById('artistPosField');
    pf.style.opacity = on ? '1' : '0.35';
    pf.style.pointerEvents = on ? '' : 'none';
    render();
  }

  // ── Render ────────────────────────────────────────────────

  function render() {
    const bg = getColor('bg');
    const fg = getColor('fg');
    const title  = document.getElementById('titleIn').value;
    const showArtist = document.getElementById('artistEnabled').checked;
    const artist = showArtist ? document.getElementById('artistIn').value : '';
    const border = parseInt(document.getElementById('borderSz').value);

    // Whether artist takes up a side column
    const artistOutside = showArtist && artist && (artistPos === 'left' || artistPos === 'right');
    const titleOutside  = titlePos === 'top' || titlePos === 'bottom';

    const titleZoneH  = titleOutside  ? IMG_MARGIN : 0;
    const artistZoneW = artistOutside ? IMG_MARGIN : 0;

    // ── Clear & background ──
    ctx.clearRect(0, 0, SZ, SZ);
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, SZ, SZ);

    // ── Image frame bounds ──
    // When artist is hidden, centre the image horizontally
    const sidePad = artistOutside ? 0 : FRAME_PAD;
    const fx = artistOutside
      ? (artistPos === 'left' ? artistZoneW : 0)
      : sidePad;
    const fy = (titlePos === 'top') ? titleZoneH : 0;
    const fw = artistOutside ? SZ - artistZoneW : SZ - sidePad * 2;
    const fh = SZ - titleZoneH;

    const frameX = fx + FRAME_PAD;
    const frameY = fy + FRAME_PAD;
    const frameW = fw - FRAME_PAD * 2;
    const frameH = fh - FRAME_PAD * 2;
    const imgX = frameX + border;
    const imgY = frameY + border;
    const imgW = frameW - border * 2;
    const imgH = frameH - border * 2;

    // ── Border rect (font colour) ──
    if (border > 0) {
      ctx.fillStyle = fg;
      ctx.fillRect(frameX, frameY, frameW, frameH);
    }

    // ── Image ──
    if (img) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(imgX, imgY, imgW, imgH);
      ctx.clip();
      const aspect = img.naturalWidth / img.naturalHeight;
      let dw = imgW, dh = imgW / aspect;
      if (dh < imgH) { dh = imgH; dw = imgH * aspect; }
      ctx.drawImage(img, imgX + (imgW - dw) / 2, imgY + (imgH - dh) / 2, dw, dh);
      ctx.restore();
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.04)';
      ctx.fillRect(imgX, imgY, imgW, imgH);
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 1;
      ctx.strokeRect(imgX + 0.5, imgY + 0.5, imgW - 1, imgH - 1);
      ctx.fillStyle = 'rgba(255,255,255,0.22)';
      ctx.font = '15px DM Sans, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('upload an image', imgX + imgW / 2, imgY + imgH / 2);
    }

    ctx.fillStyle = fg;

    // ── Title ──
    let taX, taY, taW, taH;
    if (titlePos === 'top') {
      taX = artistZoneW + PAD;
      taY = 0;
      taW = SZ - artistZoneW - PAD * 2;
      taH = titleZoneH;
    } else if (titlePos === 'bottom') {
      taX = artistZoneW + PAD;
      taY = SZ - titleZoneH;
      taW = SZ - artistZoneW - PAD * 2;
      taH = titleZoneH;
    } else if (titlePos === 'inside-top') {
      taX = imgX + PAD;
      taY = imgY;
      taW = imgW - PAD * 2;
      taH = imgH * 0.25;
    } else { // inside-bottom
      taX = imgX + PAD;
      taY = imgY + imgH * 0.75;
      taW = imgW - PAD * 2;
      taH = imgH * 0.25;
    }

    const titleFs = fitFont(title, taW, taH - PAD * 2);
    ctx.font = fontString(titleFs);
    ctx.textAlign = titleAlign;
    ctx.textBaseline = 'middle';
    ctx.fillStyle = fg;
    const titleDrawX = titleAlign === 'left' ? taX
      : titleAlign === 'right' ? taX + taW
      : taX + taW / 2;
    ctx.fillText(title, titleDrawX, taY + taH / 2);

    // ── Artist ──
    if (showArtist && artist) {
      let colW, colH, cx, cy, rotDir;

      if (artistPos === 'right') {
        colW = artistZoneW;
        colH = SZ - titleZoneH;
        cx = SZ - artistZoneW / 2;
        cy = titleZoneH + colH / 2;
        rotDir = -1;
      } else if (artistPos === 'left') {
        colW = artistZoneW;
        colH = SZ - titleZoneH;
        cx = artistZoneW / 2;
        cy = titleZoneH + colH / 2;
        rotDir = 1;
      } else if (artistPos === 'inside-right') {
        colW = imgW * 0.15;
        colH = imgH;
        cx = imgX + imgW - colW / 2;
        cy = imgY + imgH / 2;
        rotDir = -1;
      } else { // inside-left
        colW = imgW * 0.15;
        colH = imgH;
        cx = imgX + colW / 2;
        cy = imgY + imgH / 2;
        rotDir = 1;
      }

      const artistFs = fitFontVertical(artist, colW - PAD * 2, colH - PAD * 2);
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rotDir * Math.PI / 2);
      ctx.font = fontString(artistFs);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = fg;
      ctx.fillText(artist, 0, 0);
      ctx.restore();
    }
  }

  // ── Download ──────────────────────────────────────────────

  function download() {
    const title = document.getElementById('titleIn').value.trim() || 'cover';
    const a = document.createElement('a');
    a.download = title.toLowerCase().replace(/\s+/g, '-') + '.png';
    a.href = cv.toDataURL('image/png');
    a.click();
  }

  // ── File input ────────────────────────────────────────────

  document.getElementById('fileIn').addEventListener('change', e => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const i = new Image();
      i.onload = () => { img = i; render(); };
      i.src = ev.target.result;
    };
    reader.readAsDataURL(f);
    const dz = document.getElementById('dropZone');
    dz.textContent = f.name;
    dz.classList.add('has-file');
  });

  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragging'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragging'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('dragging');
    const f = e.dataTransfer.files[0];
    if (!f || !f.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const i = new Image();
      i.onload = () => { img = i; render(); };
      i.src = ev.target.result;
    };
    reader.readAsDataURL(f);
    dz.textContent = f.name;
    dz.classList.add('has-file');
  });

  render();
</script>
</body>
</html>
